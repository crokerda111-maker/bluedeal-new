      - name: Test SSH (verbose)
        shell: bash
        run: |
          set +e
          ssh -vvv -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" \
            "echo GH_OK && whoami && hostname"
          rc=$?
          echo "ssh_rc=$rc"
          exit $rc
