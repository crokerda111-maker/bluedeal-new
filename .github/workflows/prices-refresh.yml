name: Prices refresh (09/17 KST)

on:
  schedule:
    # 09:00 KST = 00:00 UTC
    # 17:00 KST = 08:00 UTC
    - cron: "0 0,8 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY }}

    steps:
      - name: Setup SSH (decode key)
        shell: bash
        run: |
          set -euo pipefail
          echo "len host=${#VPS_HOST} user=${#VPS_USER} key=${#VPS_SSH_KEY_B64}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf "%s" "$VPS_SSH_KEY_B64" | tr -d '\r' | base64 -d -i > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keygen -l -f ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Test SSH (shell request)
        shell: bash
        run: |
          set -euo pipefail
          ssh -tt -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            "$VPS_USER@$VPS_HOST" <<'EOF'
echo GH_OK
exit 0
EOF

      - name: Run refresh on VPS (shell request)
        shell: bash
        run: |
          set -euo pipefail
          ssh -tt -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            "$VPS_USER@$VPS_HOST" <<'EOF'
export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
mkdir -p /crokerda1/logs
/bin/sh /crokerda1/bin/prices_refresh.sh --out /crokerda1/www >> /crokerda1/logs/prices_refresh.log 2>&1
tail -n 5 /crokerda1/logs/prices_refresh.log || true
exit 0
EOF
