name: Prices refresh (SSH)

on:
  schedule:
    # 09:00 KST = 00:00 UTC
    # 17:00 KST = 08:00 UTC
    - cron: "0 0,8 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY }} # base64로 저장한 개인키
    steps:
      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # base64 -> 키 파일 복원 (CRLF 제거)
          printf "%s" "$VPS_SSH_KEY_B64" | tr -d '\r' | base64 -d -i > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Run refresh script on VPS
        shell: bash
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=20 \
            "$VPS_USER@$VPS_HOST" \
            "mkdir -p /crokerda1/logs && /bin/sh /crokerda1/bin/prices_refresh.sh --out /crokerda1/www >> /crokerda1/logs/prices_refresh.log 2>&1 || true; tail -n 50 /crokerda1/logs/prices_refresh.log || true"
