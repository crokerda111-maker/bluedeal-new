name: Prices refresh (09/17 KST)

on:
  schedule:
    - cron: "0 0,8 * * *"   # 09:00/17:00 KST
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          set -euxo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # ✅ base64로 저장된 키를 decode해서 파일로 복원
          printf "%s" "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # 키 파일이 정상인지 체크(내용 노출 없음)
          ssh-keygen -l -f ~/.ssh/id_ed25519

          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Run refresh on VPS
        run: |
          set -euxo pipefail
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o BatchMode=yes "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p /crokerda1/logs && /bin/sh /crokerda1/bin/prices_refresh.sh --out /crokerda1/www >> /crokerda1/logs/prices_refresh.log 2>&1"
