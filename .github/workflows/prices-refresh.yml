name: Prices refresh (09/17 KST)

on:
  schedule:
    # GitHub Actions cron은 UTC 기준
    # 09:00 KST = 00:00 UTC
    # 17:00 KST = 08:00 UTC
    - cron: "0 0,8 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Run refresh script on VPS
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "/bin/sh /crokerda1/bin/prices_refresh.sh --out /crokerda1/www >> /crokerda1/logs/prices_refresh.log 2>&1"
